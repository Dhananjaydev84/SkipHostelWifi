<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style3.css">

<!-- Currently using stlye2.css -->
 
  <title>Document</title>
</head>
<body>
  <div id="popup-root">

    <div class="container">
      <div class="header-row">
        <button id="theme-toggle" class="icon-button" title="Toggle theme">🌙</button>
        <h1>SkipHostelWifi</h1>
        <button id="settings-btn" class="icon-button" title="Settings">⚙</button>
      </div>
      <div class="subtitle">WiFi Connection Assistant</div>

      <div class="input-wrapper">
        <input id="uid" type="text" placeholder="Enter User ID" autocomplete="off">
      </div>

      <button id="submit"><span>Connect</span></button>
      <p id="output"></p>

      <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-title">Connection settings</div>
        <div class="input-wrapper">
          <input id="target-ip" type="text" placeholder="192.168.0.66" autocomplete="off">
        </div>
        <button id="save-ip" class="small-button"><span>Save IP</span></button>
      </div>
    </div>

    <!-- spacer that forces height -->
    <!-- <div style="height: 40px;"></div> -->

    <!-- <p class="credits">Built by person1 &Person2longname</p> -->

  </div>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>

  <footer class="footer">
    <span class="built-by">Built by Dhananjay dev & Arjun Sateesh </span>
    <span class="sep">•</span>
    <a href="https://github.com/Dhananjaydev84/wifi-automation" target="_blank">GitHub</a>
    <span class="sep">•</span>
    <span class="version">v1.0</span>
  </footer>

</html>
