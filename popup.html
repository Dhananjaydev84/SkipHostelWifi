<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style3.css">
  <title>SkipHostelWifi</title>
</head>

<body>
  <div id="popup-root" class="app">
    <main class="card">
      <button id="settings-btn" class="icon-button" type="button" title="Settings" aria-label="Open settings">
        <span class="icon" aria-hidden="true">&#9881;</span>
      </button>

      <header class="top-bar">
        <label class="theme-switch" title="Toggle theme">
          <input id="theme-toggle" type="checkbox" aria-label="Toggle theme">
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
        </label>

        <div class="brand">
          <div class="title">SkipHostelWifi</div>
          <div class="subtitle">WiFi Connection Assistant</div>
        </div>
        <span class="top-bar-spacer" aria-hidden="true"></span>
      </header>

      <section class="content">
        <label class="field">
          <span class="label">User ID</span>
          <input id="uid" type="text" placeholder="Enter User ID" autocomplete="off">
        </label>

        <div class="actions">
          <button id="submit" class="primary" type="button"><span>Connect</span></button>
          <button id="disconnect" class="primary hidden" type="button"><span>Disconnect</span></button>
        </div>
        <div id="output" class="status"></div>
        <div id="keep-active-status" class="keep-active-note"></div>
      </section>

      <aside id="settings-panel" class="settings-panel hidden" aria-hidden="true">
        <div class="settings-title">Settings</div>
        <label class="field">
          <span class="label">Target IP</span>
          <input id="target-ip" type="text" placeholder="192.168.0.66" autocomplete="off">
        </label>
        <div class="settings-actions">
          <button id="save-ip" class="btn-compact primary" type="button">
            <span>Save IP</span>
          </button>
          <button id="reset-ip" class="btn-compact secondary" type="button">
            <span>Reset IP</span>
          </button>
        </div>
      </aside>
    </main>

    <footer class="footer">
      <span class="footer-text">Built by</span>
      <a href="https://www.linkedin.com/in/dhananjay-dev-204b72292/" target="_blank" rel="noreferrer">Dhananjay Dev</a>
      <span class="footer-text">&amp; </span>
      <a href="https://www.linkedin.com/in/arjun-satheesh-382377390/" target="_blank" rel="noreferrer">Arjun
        Satheesh</a>
      <span class="sep">&bull;</span>
      <a href="https://github.com/Dhananjaydev84/SkipHostelWifi" target="_blank" rel="noreferrer">GitHub</a>
      <span class="sep">&bull;</span>
      <span class="footer-text">v1.1</span>
    </footer>
  </div>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>

</html>
